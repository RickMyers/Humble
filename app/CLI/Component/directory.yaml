---
bc : 
    title:  Build Controller
    description: Creates (builds) a Controller
    usage:
        linux:   sudo sh ./humble.sh --bc ns=humble nm=test ac=page use=smarty3
        windows: humble --bc file=path_to_file        
    function : build
    parameters:
        required:
            namespace|ns: Namespace of module is required
            name|nm: Name of the controller
            action|ac: Name of the action
        optional:
            description|desc: Description of controller
            action_description|ad: Description for action
            templater|ts|use: The templater to use, if not specified will use default
cm : 
    title: Create Component
    description: Creates a Component (Model Helper Entity)
    usage:
        linux:   sudo sh ./humble.sh --a file=path_to_file
        windows: humble --a file=path_to_file        
    function :
    parameters:
        required:
            namespace|ns: Namespace of module is required
            name|nm: Name of the controller
            type|ty: Type of component
        optional:
            package|pk: Documentation Package
            category|ct: Documentation Category
            description|desc: Long Description
            title|tl: Short Description
            event|ev: Only for Logical Models, will generate events
cc  : 
    title: Compile Controller
    description: Compiles a Controller
    usage:
        linux:   sudo sh ./humble.sh --cc file=path_to_file
        windows: humble --cc file=path_to_file        
    function : compile
    parameters:
        required:
            file|fi: path to the file to compile
        optional:
g  : 
    title: Generate Edits
    description: Generate JSON Edits (Not-Implemented)
    usage:
        linux:   sudo sh ./humble.sh --a file=path_to_file
        windows: humble --a file=path_to_file        
    function :
    parameters:
        required:
        optional:
sc|syntax  : 
    title: Controller Syntax Check
    description: Syntax check a controller
    usage:
        linux:   sudo sh ./humble.sh --sc ns=desired_namespace cn=path_to_file
        windows: humble --sc  --sc ns=desired_namespace cn=path_to_file
    function : syntaxCheck
    parameters:
        required:
            ns|namespace: Namespace of module where controller resides
            cn|controller: Controller name
        optional:            
            out: out=JSON will return the errors as a JSON string
yc|yaml  : 
    title: RPC YaML Syntax Check
    description: Syntax check an RPC Mapping.yaml file controller
    usage:
        linux:   sudo sh ./humble.sh --yc ns=desired_namespace
        windows: humble --sc  --yc ns=desired_namespac
    function : yamlCheck
    parameters:
        required:
            ns|namespace: Namespace of module where controller resides
        optional:            
ed|edit|edits  : 
    title: Create Form Edits File
    description: Create a form edits file
    usage:
        linux:   sudo sh ./humble.sh --ed ns=namespace fi=output_file_name fm=form_name al=edit_alias
        windows: humble --ed ns=namespace fi=output_file_name fm=form_name al=edit_alias
    function : createEdits
    parameters:
        required:
            ns|namespace: Namespace of module which owns the edits
            fi|file: Output JSON file name
            fm|form: Form name that the edits applies to
            al|alias: Alias of the output JSON file
        optional:            
            
