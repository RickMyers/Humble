---
o : 
    title: Toggle Application On/Off
    description: Toggles the application online or offline
    extended: Toggling the system offline will prevent most of the framework functionality from working
    usage: 
        linux:   sudo sh ./humble.sh --o
        windows: humble --o    
    function : toggle
    directive: true
    parameters:
        required:
        optional:
l : 
    title: Toggle Authentication
    description: Toggle local authentication vs SSO
    usage:
        linux:   sudo sh ./humble.sh --o
        windows: humble --o    
    function : toggleAuthentication
    directive: true
    parameters:
        required:
        optional:
s : 
    title: Show Application Status
