    parameters:
        required:
        optional:
ccc|controllers:
    title: Clear Controllers
    description: Clear Controller Cache
    extended: This action deletes all of the compiled controllers forcing recompilation next time they are invoked
    usage:
        linux:   sudo sh ./humble.sh --ccc
        windows: humble --ccc 
    function : clearControllers
    directive: true
    parameters:
        required:
        optional:
cvc|views:
    title: Clear Views
    description: Clear Views Cache
    extended: This action deletes all of the generated views forcing regeneration next time they are viewed
    usage:
        linux:   sudo sh ./humble.sh --cvc
        windows: humble --cvc 
    function : clearViews
    directive: true
    parameters:
        required:
        optional:          
adduser : 
    title: Add User
    description: Create a user in the humble user directory
    usage: 
        linux:   sudo sh ./humble.sh --adduser first=john last=doe user=jdoe pwd=bestpasswordever em=johndoe@gmail.com
        windows: humble --adduser first=john last=doe user=jdoe pwd=bestpasswordever em=johndoe@gmail.com
    function : addUser
    parameters:
        required:
            first_name|first: The first name of the user
            last_name|last: The last name of the user
            user_name|user: Desired username
        optional:
            password|pwd: The password for the user, or omit to have a password generated and it will be displayed
            email|em: Users email address
